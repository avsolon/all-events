<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}All Events - Бизнес мероприятия Новосибирска{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="{{ base_path }}/static/css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-lg border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="{{ base_path }}/" class="flex items-center space-x-2 text-xl font-bold text-indigo-600">
                        <i class="fas fa-calendar-alt"></i>
                        <span>All Events</span>
                    </a>
                    <div class="hidden md:flex space-x-4">
                        <a href="{{ base_path }}/events" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-indigo-600 hover:bg-gray-100 transition">
                            <i class="fas fa-list mr-1"></i>Мероприятия
                        </a>
                        <a href="{{ base_path }}/calendar" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-indigo-600 hover:bg-gray-100 transition">
                            <i class="fas fa-calendar mr-1"></i>Календарь
                        </a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="https://t.me/AlleventsNsk_bot" target="_blank" class="hidden md:flex items-center px-3 py-2 rounded-md text-sm font-medium text-blue-500 hover:text-blue-700 hover:bg-blue-50 transition">
                        <i class="fab fa-telegram mr-1.5"></i>Бот
                    </a>
                    <span class="text-sm text-gray-500">
                        <i class="fas fa-map-marker-alt text-red-500"></i> Новосибирск
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 py-6">
            <div class="text-center text-gray-500 text-sm">
                <p>All Events Novosibirsk &copy; 2026 - Агрегатор бизнес-мероприятий</p>
                <div class="mt-3 flex justify-center space-x-4">
                    <a href="https://t.me/AlleventsNsk_bot" target="_blank" class="text-blue-500 hover:text-blue-700 transition">
                        <i class="fab fa-telegram text-lg"></i> Telegram-бот
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ base_path }}/static/js/main.js"></script>
</body>
</html>
