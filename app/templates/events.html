{% extends "base.html" %}
{% block title %}Мероприятия - All Events{% endblock %}
{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-800">Мероприятия</h1>
        <div class="text-sm text-gray-500" id="total-count">Загрузка...</div>
    </div>

    <div class="bg-white rounded-lg shadow p-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Категория</label>
                <select id="filter-category" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    <option value="">Все категории</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Цена</label>
                <select id="filter-price" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    <option value="">Все</option>
                    <option value="free">Бесплатные</option>
                    <option value="paid">Платные</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Формат</label>
                <select id="filter-format" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    <option value="">Все</option>
                    <option value="offline">Офлайн</option>
                    <option value="online">Онлайн</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Поиск</label>
                <input type="text" id="filter-search" placeholder="Поиск по мероприятиям..." class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
        </div>
        <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100">
            <div class="flex gap-2">
                <button class="filter-btn active px-3 py-1 rounded text-sm font-medium bg-indigo-600 text-white" data-period="upcoming">Предстоящие</button>
                <button class="filter-btn px-3 py-1 rounded text-sm font-medium bg-gray-200 text-gray-700 hover:bg-gray-300" data-period="today">Сегодня</button>
                <button class="filter-btn px-3 py-1 rounded text-sm font-medium bg-gray-200 text-gray-700 hover:bg-gray-300" data-period="week">Неделя</button>
                <button class="filter-btn px-3 py-1 rounded text-sm font-medium bg-gray-200 text-gray-700 hover:bg-gray-300" data-period="month">Месяц</button>
                <button class="filter-btn px-3 py-1 rounded text-sm font-medium bg-gray-200 text-gray-700 hover:bg-gray-300" data-period="all">Все</button>
            </div>
            <div class="flex gap-2">
                <select id="sort-select" class="border border-gray-300 rounded px-3 py-1 text-sm">
                    <option value="start_date">По дате</option>
                    <option value="title">По названию</option>
                    <option value="price">По цене</option>
                </select>
                <select id="order-select" class="border border-gray-300 rounded px-3 py-1 text-sm">
                    <option value="asc">По возрастанию</option>
                    <option value="desc">По убыванию</option>
                </select>
            </div>
        </div>
    </div>

    <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <div id="pagination" class="flex justify-center gap-2 mt-6"></div>
</div>

<script>
const EVENTS_API = "/api/events";
let currentPage = 1;
let currentFilters = { period: "upcoming" };

function getFilters() {
    return {
        categories: document.getElementById("filter-category").value ? [parseInt(document.getElementById("filter-category").value)] : undefined,
        is_free: document.getElementById("filter-price").value === "free" ? true : document.getElementById("filter-price").value === "paid" ? false : undefined,
        is_online: document.getElementById("filter-format").value === "online" ? true : document.getElementById("filter-format").value === "offline" ? false : undefined,
        search: document.getElementById("filter-search").value || undefined,
        sort_by: document.getElementById("sort-select").value,
        sort_order: document.getElementById("order-select").value,
        ...currentFilters,
    };
}

async function loadEvents(page = 1) {
    const filters = getFilters();
    const params = new URLSearchParams({ page, page_size: 12, ...filters });

    for (const [key, val] of Object.entries(filters)) {
        if (val !== undefined && val !== "") {
            if (Array.isArray(val)) {
                val.forEach(v => params.append(key, v));
            } else {
                params.set(key, val);
            }
        }
    }

    try {
        const res = await fetch(`${EVENTS_API}?${params}`);
        const data = await res.json();
        renderEvents(data);
    } catch (err) {
        console.error("Failed to load events:", err);
    }
}

function renderEvents(data) {
    const grid = document.getElementById("events-grid");
    document.getElementById("total-count").textContent = `Найдено: ${data.total} мероприятий`;

    if (!data.events || data.events.length === 0) {
        grid.innerHTML = `<div class="col-span-3 text-center py-12 text-gray-500">
            <i class="fas fa-calendar-times text-4xl mb-3"></i>
            <p>Мероприятий по заданным критериям не найдено</p>
        </div>`;
        return;
    }

    grid.innerHTML = data.events.map(e => `
        <div class="bg-white rounded-lg shadow-md hover:shadow-lg transition overflow-hidden border border-gray-100">
            ${e.image_url ? `<img src="${e.image_url}" alt="${e.title}" class="w-full h-40 object-cover" onerror="this.style.display='none'">` : ""}
            <div class="p-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium text-indigo-600 bg-indigo-50 px-2 py-1 rounded">${e.source_id}</span>
                    ${e.is_free ? '<span class="text-xs font-medium text-green-600 bg-green-50 px-2 py-1 rounded"><i class="fas fa-check-circle mr-1"></i>Бесплатно</span>' : e.price ? `<span class="text-xs font-medium text-orange-600 bg-orange-50 px-2 py-1 rounded">${e.price_text || e.price + " ₽"}</span>` : ""}
                </div>
                <a href="/events/${e.id}" class="block mt-1">
                    <h3 class="text-lg font-semibold text-gray-800 hover:text-indigo-600 transition">${e.title}</h3>
                </a>
                <div class="mt-3 space-y-1 text-sm text-gray-500">
                    <div><i class="far fa-calendar mr-2"></i>${e.start_date ? new Date(e.start_date).toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric", hour: "2-digit", minute: "2-digit" }) : "Дата уточняется"}</div>
                    ${e.venue ? `<div><i class="fas fa-map-pin mr-2"></i>${e.venue}</div>` : ""}
                </div>
                ${e.categories && e.categories.length ? `<div class="mt-3 flex flex-wrap gap-1">${e.categories.map(c => `<span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded">${c.name}</span>`).join("")}</div>` : ""}
                <a href="/events/${e.id}" class="mt-3 inline-block text-sm text-indigo-600 hover:text-indigo-800 font-medium">Подробнее <i class="fas fa-arrow-right ml-1"></i></a>
            </div>
        </div>
    `).join("");

    renderPagination(data);
}

function renderPagination(data) {
    const container = document.getElementById("pagination");
    if (data.total_pages <= 1) { container.innerHTML = ""; return; }

    let html = "";
    if (data.page > 1) html += `<button class="px-3 py-1 rounded bg-gray-200 hover:bg-gray-300 text-sm" onclick="loadEvents(${data.page - 1})">Назад</button>`;

    for (let i = Math.max(1, data.page - 2); i <= Math.min(data.total_pages, data.page + 2); i++) {
        html += `<button class="px-3 py-1 rounded text-sm ${i === data.page ? 'bg-indigo-600 text-white' : 'bg-gray-200 hover:bg-gray-300'}" onclick="loadEvents(${i})">${i}</button>`;
    }

    if (data.page < data.total_pages) html += `<button class="px-3 py-1 rounded bg-gray-200 hover:bg-gray-300 text-sm" onclick="loadEvents(${data.page + 1})">Вперед</button>`;
    container.innerHTML = html;
}

document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", function() {
        document.querySelectorAll(".filter-btn").forEach(b => {
            b.classList.remove("bg-indigo-600", "text-white");
            b.classList.add("bg-gray-200", "text-gray-700");
        });
        this.classList.remove("bg-gray-200", "text-gray-700");
        this.classList.add("bg-indigo-600", "text-white");

        const now = new Date();
        const period = this.dataset.period;
        currentFilters = {};
        if (period === "today") {
            currentFilters.date_from = now.toISOString().split("T")[0];
            currentFilters.date_to = now.toISOString().split("T")[0];
        } else if (period === "week") {
            const weekEnd = new Date(now);
            weekEnd.setDate(weekEnd.getDate() + 7);
            currentFilters.date_from = now.toISOString().split("T")[0];
            currentFilters.date_to = weekEnd.toISOString().split("T")[0];
        } else if (period === "month") {
            const monthEnd = new Date(now);
            monthEnd.setDate(monthEnd.getDate() + 30);
            currentFilters.date_from = now.toISOString().split("T")[0];
            currentFilters.date_to = monthEnd.toISOString().split("T")[0];
        } else if (period === "upcoming") {
            currentFilters.date_from = now.toISOString().split("T")[0];
        }
        loadEvents(1);
    });
});

document.getElementById("filter-category").addEventListener("change", () => loadEvents(1));
document.getElementById("filter-price").addEventListener("change", () => loadEvents(1));
document.getElementById("filter-format").addEventListener("change", () => loadEvents(1));
document.getElementById("sort-select").addEventListener("change", () => loadEvents(1));
document.getElementById("order-select").addEventListener("change", () => loadEvents(1));

let searchTimeout;
document.getElementById("filter-search").addEventListener("input", function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => loadEvents(1), 400);
});

loadEvents();
</script>
{% endblock %}
