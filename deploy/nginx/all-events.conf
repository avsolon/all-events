# Nginx config for All Events Novosibirsk
# Place in /etc/nginx/sites-available/ (or /etc/nginx/conf.d/)
# Then enable: ln -s /etc/nginx/sites-available/all-events.conf /etc/nginx/sites-enabled/
# Adjust server_name and ssl paths to match your setup

server {
    listen 80;
    server_name events.yourdomain.com;  # <-- ЗАМЕНИТЕ НА ВАШ ДОМЕН

    # Перенаправление на HTTPS (если нужен SSL)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name events.yourdomain.com;  # <-- ЗАМЕНИТЕ НА ВАШ ДОМЕН

    # SSL сертификаты (настройте под вашу конфигурацию)
    ssl_certificate     /etc/ssl/certs/yourdomain.pem;       # <-- ЗАМЕНИТЕ
    ssl_certificate_key /etc/ssl/private/yourdomain.key;     # <-- ЗАМЕНИТЕ
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    # Статика (кэшируется на 1 день)
    location /static/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # API и основное приложение
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Логи
    access_log /var/log/nginx/all-events-access.log;
    error_log  /var/log/nginx/all-events-error.log;
}
